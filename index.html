<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#007AFF">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>健康追踪</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"SF Pro","Helvetica Neue",sans-serif;background:#f5f7fa;color:#1d1d1f;font-size:16px;-webkit-font-smoothing:antialiased}
body{padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0);padding-left:env(safe-area-inset-left,0);padding-right:env(safe-area-inset-right,0)}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}
.view{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px}
.view.hidden{display:none}
.tab-bar{position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid #e5e5ea;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom,0));z-index:100}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;font-size:11px;color:#8e8e93;cursor:pointer;padding:4px 0}
.tab-btn.active{color:#007AFF}
.tab-btn svg{width:24px;height:24px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 0.5px 1px rgba(0,0,0,.04)}
.card-title{font-size:17px;font-weight:600;margin-bottom:8px}
.card-sub{font-size:13px;color:#8e8e93;margin-bottom:4px}
.progress-bar{height:6px;background:#e5e5ea;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#007AFF;border-radius:3px;transition:width .3s}
.label{font-size:15px;font-weight:500;margin-bottom:6px;margin-top:12px}
.label:first-child{margin-top:0}
.hint{font-size:12px;color:#8e8e93;margin-bottom:8px}
.option-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.option-btn{padding:8px 16px;border:1.5px solid #e5e5ea;border-radius:20px;background:#fff;font-size:14px;color:#1d1d1f;cursor:pointer;transition:all .15s;user-select:none}
.option-btn.selected{border-color:#007AFF;background:#e8f0fe;color:#007AFF}
.number-select{display:flex;align-items:center;gap:12px}
.number-select button{width:36px;height:36px;border-radius:50%;border:1.5px solid #e5e5ea;background:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.number-select .value{font-size:20px;font-weight:600;min-width:48px;text-align:center}
textarea{width:100%;padding:12px;border:1.5px solid #e5e5ea;border-radius:10px;font-size:15px;font-family:inherit;resize:vertical;min-height:60px;background:#fff;outline:none;transition:border-color .15s}
textarea:focus{border-color:#007AFF}
select{width:100%;padding:10px;border:1.5px solid #e5e5ea;border-radius:10px;font-size:15px;font-family:inherit;background:#fff;outline:none;margin-bottom:8px;-webkit-appearance:auto;appearance:auto;color:#1d1d1f}
select:focus{border-color:#007AFF}
.dim-card{padding:16px;border-radius:12px;background:#fff;margin-bottom:10px;box-shadow:0 0.5px 1px rgba(0,0,0,.04);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:transform .1s}
.dim-card:active{transform:scale(.98)}
.dim-card .name{font-size:16px;font-weight:600}
.dim-card .score{font-size:14px;padding:4px 10px;border-radius:12px}
.dim-card .score.empty{background:#f2f2f7;color:#8e8e93}
.dim-card .score.filled{background:#e8f0fe;color:#007AFF}
.dim-card .arrow{color:#c7c7cc;font-size:18px}
.score-group{display:flex;gap:6px;flex-wrap:wrap}
.score-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #e5e5ea;background:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.score-btn.selected{border-color:#007AFF;background:#007AFF;color:#fff}
.score-label{font-size:13px;color:#8e8e93;margin-top:8px;text-align:center}
.header{padding:16px;padding-top:calc(16px + env(safe-area-inset-top,0));background:#fff}
.header .date{font-size:20px;font-weight:700}
.header .sub{font-size:13px;color:#8e8e93;margin-top:2px}
.back-btn{border:none;background:none;font-size:16px;color:#007AFF;cursor:pointer;padding:8px 0;margin-bottom:8px;display:inline-flex;align-items:center;gap:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.cal-grid .day{padding:8px 0;border-radius:8px;font-size:14px;cursor:pointer}
.cal-grid .day.today{font-weight:700}
.cal-grid .day.has-record::after{content:'';display:block;width:6px;height:6px;border-radius:50%;margin:2px auto 0}
.cal-grid .day.has-record.completed::after{background:#34c759}
.cal-grid .day.has-record.incomplete::after{background:#ff9500}
.cal-grid .day.other-month{color:#c7c7cc}
.cal-header{display:flex;justify-content:space-between;align-items:center;padding:12px 0}
.export-btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;transition:opacity .15s}
.export-btn:active{opacity:.7}
.export-btn.primary{background:#007AFF;color:#fff}
.export-btn.secondary{background:#f2f2f7;color:#1d1d1f}
.exercise-group{border:1.5px solid #e5e5ea;border-radius:10px;padding:12px;margin-bottom:8px;position:relative}
.exercise-group .remove{position:absolute;top:8px;right:8px;border:none;background:none;font-size:18px;color:#ff3b30;cursor:pointer}
.add-exercise{border:1.5px dashed #c7c7cc;border-radius:10px;padding:12px;background:none;font-size:14px;color:#007AFF;cursor:pointer;width:100%;text-align:center}
</style>
</head>
<body>
<div id="app"></div>
<script>/* ============ Data Model ============ */
const EMPTY_RECORD = {
  completed: false, updatedAt: 0,
  physical: {
    score: null, sleep_difficulty: null, sleep_hours: null, sleep_depth: null,
    sleep_quality: null, sleep_tiredness: null, sleep_routine: null,
    appetite: null, breakfast: [], lunch: [], dinner: [], drinks: [],
    meal_regularity: [], diet_behavior: null, water: null, stool: null,
    exercises: [], sedentary: null,
    qi_blood: null, symptoms: [],
    hospital: "", department: "", visit_reason: "", medication: "", medication_reason: ""
  },
  mental: {
    score: null, mood_tags: [],
    mental_states: [],
    stress_source: "", stress_tolerance: null,
    self_soothe_ability: null, self_soothe_action: "",
    recovery_speed: null,
    self_denial: null, self_denial_reason: "",
    accept_present: null, accept_present_reason: ""
  },
  behavior: {
    score: null, completion_rate: null, procrastination: null,
    startup_resistance: "", flow_state: null, task_stagnation: null,
    short_video_hours: null, scroll_frequency: null,
    revenge_leisure: null, slack_pattern: null,
    can_stop: null, adjustment_action: ""
  },
  interpersonal: {
    score: null, bf_communication: null, parent_communication: null,
    conflict: "", understanding: null, expectation_gap: null,
    relationship_status: [],
    social_hours: null, social_drain: null, solitude: null,
    boundary_issue: null, boundary_reason: "",
    has_support: null, support_channel: ""
  },
  purpose: {
    score: null, has_short_term_goal: null, has_long_term_direction: null,
    goal_vague: null, feels_wasted: null, feels_fulfilled: null,
    has_stable_path: null, drifts_easily: null, long_term_motivation: null
  }
};

/* ============ IndexedDB Layer ============ */
const DB_NAME = "HealthTracker", DB_VER = 1, STORE = "records";
const DB = {};
DB.open = () => new Promise((res, rej) => {
  const r = indexedDB.open(DB_NAME, DB_VER);
  r.onerror = () => rej(r.error);
  r.onsuccess = () => res(r.result);
  r.onupgradeneeded = e => {
    const d = e.target.result;
    if (!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE, { keyPath: "id" });
  };
});
DB.save = async (id, data) => {
  const d = await DB.open(); const tx = d.transaction(STORE, "readwrite");
  const s = tx.objectStore(STORE); data.id = id; data.updatedAt = Date.now();
  return new Promise((res, rej) => { const r = s.put(data); r.onsuccess = ()=>res(); r.onerror = ()=>rej(r.error); });
};
DB.get = async id => {
  const d = await DB.open(); const tx = d.transaction(STORE, "readonly");
  const s = tx.objectStore(STORE);
  return new Promise((res, rej) => { const r = s.get(id); r.onsuccess = ()=>res(r.result||null); r.onerror = ()=>rej(r.error); });
};
DB.getAll = async () => {
  const d = await DB.open(); const tx = d.transaction(STORE, "readonly");
  const s = tx.objectStore(STORE);
  return new Promise((res, rej) => { const r = s.getAll(); r.onsuccess = ()=>res(r.result); r.onerror = ()=>rej(r.error); });
};
DB.getMonth = async (year, month) => {
  const all = await DB.getAll(); const p = year + "-" + String(month).padStart(2,"0");
  return all.filter(r => r.id && r.id.startsWith(p));
};

/* ============ App Utilities ============ */
const APP = {};
APP.today = () => { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); };
APP.todayCN = () => { const d = new Date(); const w = ["日","一","二","三","四","五","六"]; return d.getFullYear() + "年" + (d.getMonth()+1) + "月" + d.getDate() + "日 周" + w[d.getDay()]; };
APP.dateCN = (id) => { const p = id.split("-"); const d = new Date(+p[0], +p[1]-1, +p[2]); const w = ["日","一","二","三","四","五","六"]; return +p[0] + "年" + (+p[1]) + "月" + (+p[2]) + "日 周" + w[d.getDay()]; };
APP.deepMerge = (t, s) => {
  if (!t) return JSON.parse(JSON.stringify(s));
  for (const k in s) {
    if (s[k] && typeof s[k] === "object" && !Array.isArray(s[k])) t[k] = APP.deepMerge(t[k]||{}, s[k]);
        if (t[k] == null) t[k] = s[k];
  }
  return t;
};
APP.getOrCreateToday = async () => {
  const id = APP.today(); let r = await DB.get(id);
  return r ? APP.deepMerge(r, JSON.parse(JSON.stringify(EMPTY_RECORD))) : { id, ...JSON.parse(JSON.stringify(EMPTY_RECORD)) };
};
APP.getOrCreateDate = async (id) => {
  let r = await DB.get(id);
  return r ? APP.deepMerge(r, JSON.parse(JSON.stringify(EMPTY_RECORD))) : { id, ...JSON.parse(JSON.stringify(EMPTY_RECORD)) };
};

/* ============ Dimension Configuration ============ */
const DIM_LABELS = {
  physical: { label: "生理躯体健康", sub: "底层硬件基础", color: "#007AFF" },
  mental:   { label: "心理情绪健康", sub: "内在感受中枢", color: "#8E8E93" },
  behavior: { label: "时间与行为健康", sub: "心智自律层", color: "#FF9F0A" },
  interpersonal: { label: "人际亲密健康", sub: "外部互动系统", color: "#30D158" },
  purpose:  { label: "精神目标健康", sub: "顶层意义坐标", color: "#FF453A" }
};
const DIM_KEYS = Object.keys(DIM_LABELS);
let currentRecord = null, currentDim = null, currentDate = null;
/* ============ Auto Save ============ */
APP.autoSave = async () => {
  if (!currentRecord || !currentDate) return;
  currentRecord.updatedAt = Date.now();
  if (currentDim) {
    const c = DIM_KEYS.filter(k => currentRecord[k] && currentRecord[k].score !== null).length;
    if (c >= 5) currentRecord.completed = true;
  }
  await DB.save(currentDate, currentRecord);
};

/* ============ Render Helpers ============ */
APP.h = (tag, attrs, ...children) => {
  const el = document.createElement(tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (k === "className") el.className = v;
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v !== undefined && v !== null && v !== false) el.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === "string" || typeof c === "number") el.appendChild(document.createTextNode(c));
    else if (c.nodeType) el.appendChild(c);
  }
  return el;
};
APP.empty = (el) => { while (el.firstChild) el.removeChild(el.firstChild); };

APP.renderRadio = (name, options, value, onChange, placeholder) => {
  const sel = document.createElement("select");
  sel.style.cssText = "width:100%;padding:10px;border:1.5px solid #e5e5ea;border-radius:10px;font-size:15px;font-family:inherit;background:#fff;outline:none;margin-bottom:8px;-webkit-appearance:auto";
  if (placeholder) { const o = document.createElement("option"); o.value=""; o.textContent=placeholder; sel.appendChild(o); }
  for (const opt of options) {
    const o = document.createElement("option");
    o.value = opt; o.textContent = opt;
    if (value === opt) o.selected = true;
    sel.appendChild(o);
  }
  sel.addEventListener("change", () => { onChange(sel.value); APP.autoSave(); });
  return sel;
};

APP.renderCheckbox = (name, options, value, onChange) => {
  const g = APP.h("div", { className: "option-group" });
  for (const opt of options) {
    const btn = APP.h("button", { className: "option-btn" + (value && value.includes(opt) ? " selected" : ""), type: "button" }, opt);
    btn.addEventListener("click", () => {
      let a = value ? [...value] : [];
      if (a.includes(opt)) { a = a.filter(v => v !== opt); btn.classList.remove("selected"); }
      else { a.push(opt); btn.classList.add("selected"); }
      onChange(a); APP.autoSave();
    });
    g.appendChild(btn);
  }
  return g;
};

APP.renderNumber = (min, max, value, onChange, unit) => {
  const c = APP.h("div", { className: "number-select" });
  const initVal = value != null ? value : min;
  const valEl = APP.h("span", { className: "value" }, initVal + (unit || ""));
  const decBtn = APP.h("button", { type: "button" }, "−");
  const incBtn = APP.h("button", { type: "button" }, "+");
  decBtn.addEventListener("click", () => {
    const cur = parseInt(valEl.textContent) || min;
    const nv = Math.max(min, cur - 1);
    valEl.textContent = nv + (unit || "");
    onChange(nv); APP.autoSave();
  });
  incBtn.addEventListener("click", () => {
    const cur = parseInt(valEl.textContent) || min;
    const nv = Math.min(max, cur + 1);
    valEl.textContent = nv + (unit || "");
    onChange(nv); APP.autoSave();
  });
  c.appendChild(decBtn);
  c.appendChild(valEl);
  c.appendChild(incBtn);
  return c;
};

APP.renderText = (value, onChange, placeholder) => {
  const el = APP.h("textarea", { placeholder: placeholder || "填写备注..." });
  if (value) el.value = value;
  el.addEventListener("input", () => onChange(el.value));
  el.addEventListener("blur", () => APP.autoSave());
  return el;
};

APP.renderScore = (value, onChange) => {
  const c = APP.h("div", {});
  const g = APP.h("div", { className: "score-group" });
  const labelEl = APP.h("div", { className: "score-label" }, value ? "当前评分：" + value + "/10" : "点击选择评分（1-10）");
  for (let i = 1; i <= 10; i++) {
    const btn = APP.h("button", { className: "score-btn" + (value === i ? " selected" : ""), type: "button" }, i);
    btn.addEventListener("click", () => {
      g.querySelectorAll(".score-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      labelEl.textContent = "当前评分：" + i + "/10";
      onChange(i); APP.autoSave();
    });
    g.appendChild(btn);
  }
  c.appendChild(g);
  c.appendChild(labelEl);
  return c;
};


APP.renderMultiSelect = (name, options, value, onChange, placeholder) => {
  const c = document.createElement("div");
  c.style.cssText = "margin-bottom:8px";
  let currentValue = (value || []).slice();
  const tagsDiv = document.createElement("div");
  tagsDiv.style.cssText = "display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px";
  const sel = document.createElement("select");
  sel.style.cssText = "flex:1;padding:8px;border:1.5px solid #e5e5ea;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;outline:none;color:#1d1d1f";
  const addBtn = document.createElement("button");
  addBtn.textContent = "+";
  addBtn.style.cssText = "padding:8px 14px;border:none;border-radius:8px;background:#007AFF;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0";
  const rebuild = () => {
    while (tagsDiv.firstChild) tagsDiv.removeChild(tagsDiv.firstChild);
    for (const item of currentValue) {
      const tag = document.createElement("span");
      tag.style.cssText = "display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#e8f0fe;color:#007AFF;border-radius:16px;font-size:13px";
      tag.appendChild(document.createTextNode(item));
      const rm = document.createElement("button");
      rm.textContent = "✕";
      rm.style.cssText = "border:none;background:none;font-size:14px;color:#007AFF;cursor:pointer;padding:0;line-height:1;margin-left:2px";
      rm.onclick = () => { currentValue = currentValue.filter(v => v !== item); onChange(currentValue); APP.autoSave(); rebuild(); };
      tag.appendChild(rm);
      tagsDiv.appendChild(tag);
    }
    while (sel.firstChild) sel.removeChild(sel.firstChild);
    const remaining = options.filter(o => !currentValue.includes(o));
    if (remaining.length === 0) { const o = document.createElement("option"); o.textContent = "已全选"; sel.appendChild(o); }
    else {
      const ph = document.createElement("option"); ph.value = ""; ph.textContent = placeholder||"选择..."; ph.selected = true; sel.appendChild(ph);
      for (const opt of remaining) { const o = document.createElement("option"); o.value=opt; o.textContent=opt; sel.appendChild(o); }
    }
  };
  addBtn.onclick = () => {
    if (sel.value && sel.value !== "") { currentValue.push(sel.value); currentValue = [...currentValue]; onChange(currentValue); APP.autoSave(); rebuild(); }
  };
  rebuild();
  c.appendChild(tagsDiv);
  const row = document.createElement("div");
  row.style.cssText = "display:flex;gap:6px";
  row.appendChild(sel); row.appendChild(addBtn); c.appendChild(row);
  return c;
};APP.renderLabel = (text, hint) => {
  const el = APP.h("div", { className: "label" }, text);
  if (hint) el.appendChild(APP.h("div", { className: "hint" }, hint));
  return el;
};

APP.renderSection = (title) => APP.h("div", { style: "font-size:15px;font-weight:600;margin-top:20px;margin-bottom:8px;padding-top:12px;border-top:1px solid #eee" }, title);

APP.showToast = (msg) => {
  const el = APP.h("div", { style: "position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:999;transition:opacity .3s" }, msg);
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = "0"; setTimeout(() => el.remove(), 300); }, 1500);
};

/* ============ Layout & Navigation ============ */
APP.init = async () => {
  currentDate = APP.today();
  currentRecord = await APP.getOrCreateToday();
  APP.renderLayout();
  await APP.renderHome();
};

APP.renderLayout = () => {
  const app = document.getElementById("app");
  APP.empty(app);
  app.innerHTML = '<div class="view" id="view-home"></div><div class="view hidden" id="view-dim"></div><div class="view hidden" id="view-history"></div><div class="view hidden" id="view-export"></div><nav class="tab-bar"><button class="tab-btn active" data-view="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1"/></svg><span>今日</span></button><button class="tab-btn" data-view="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>历史</span></button><button class="tab-btn" data-view="export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg><span>导出</span></button></nav>';
  document.querySelectorAll(".tab-btn").forEach(btn => { btn.addEventListener("click", () => APP.switchView(btn.dataset.view)); });
};

APP.switchView = async (view) => {
  document.querySelectorAll(".view").forEach(v => v.classList.add("hidden"));
  document.getElementById("view-" + view).classList.remove("hidden");
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.view === view));
  if (view === "home") await APP.renderHome();
  else if (view === "history") await APP.renderHistory();
  else if (view === "export") APP.renderExport();
};

APP.goHome = async () => {
  currentDim = null; await APP.autoSave();
  currentDate = APP.today();
  currentRecord = await APP.getOrCreateToday();
  await APP.switchView("home");
};

APP.openDimension = async (key, dateId) => {
  currentDim = key;
  currentDate = dateId || APP.today();
  currentRecord = await APP.getOrCreateDate(currentDate);
  document.getElementById("view-dim").classList.remove("hidden");
  document.getElementById("view-home").classList.add("hidden");
  APP.renderDimension(key);
};

/* ============ Home Page ============ */
APP.renderHome = async () => {
  currentDim = null;
  currentRecord = await APP.getOrCreateToday();
  const c = document.getElementById("view-home");
  APP.empty(c);
  const h = APP.h("div", { className: "header" });
  h.appendChild(APP.h("div", { className: "date" }, APP.todayCN()));
  c.appendChild(h);
  const ct = DIM_KEYS.filter(k => currentRecord[k] && currentRecord[k].score !== null).length;
  const p = APP.h("div", { className: "card" });
  p.appendChild(APP.h("div", { className: "card-title" }, "健康记录进度"));
  p.appendChild(APP.h("div", { className: "card-sub" }, "已完成 " + ct + "/5 个维度"));

  c.appendChild(APP.renderLabel("做事能否获得充实感"));
  c.appendChild(APP.renderRadio("fulfilled", ["是","否"], dim.feels_fulfilled, v => { dim.feels_fulfilled = v; }));
  c.appendChild(APP.renderSection("内在秩序感"));
  c.appendChild(APP.renderLabel("生活是否有稳定主线"));
  c.appendChild(APP.renderRadio("stable", ["是","否"], dim.has_stable_path, v => { dim.has_stable_path = v; }));
  c.appendChild(APP.renderLabel("容易陷入漫无目的、被动消磨时光"));
  c.appendChild(APP.renderRadio("drifts", ["是","否"], dim.drifts_easily, v => { dim.drifts_easily = v; }));
  c.appendChild(APP.renderSection("长期动力"));
  c.appendChild(APP.renderRadio("motivation", ["持续保有成长意愿","持续躺平、失去行动渴望"], dim.long_term_motivation, v => { dim.long_term_motivation = v; }));

};
/* ============ Dimension Render Dispatcher ============ */
APP.renderDimension = (key) => {
  try {
    const container = document.getElementById("view-dim");
    APP.empty(container);
    const backBtn = APP.h("button", { className: "back-btn",
      onClick: () => APP.goHome() }, "← 返回");
    container.appendChild(backBtn);
    const dateStr = currentDate === APP.today() ?
      "今天" : APP.dateCN(currentDate);
    container.appendChild(APP.h("div",
      { style: "font-size:13px;color:#8E8E93;margin-bottom:8px" }, dateStr));
    let form;
    switch (key) {
      case "physical": form = APP.renderPhysical(); break;
      case "mental": form = APP.renderMental(); break;
      case "behavior": form = APP.renderBehavior(); break;
      case "interpersonal": form = APP.renderInterpersonal(); break;
      case "purpose": form = APP.renderPurpose(); break;
    }
    if (form) container.appendChild(form);
  } catch (e) {
    const d = document.getElementById("view-dim");
    APP.empty(d);
    d.appendChild(APP.h("button",{className:"back-btn",
      onClick:()=>APP.goHome()},"← 返回"));
    d.appendChild(APP.h("div",
      {style:"padding:20px;color:#FF3B30;font-size:15px"},
      "错误: "+(e.message||"")));
  }
};

/* ============ History Calendar View ============ */
APP.renderHistory = async () => {
  const container = document.getElementById("view-history");
  APP.empty(container);
  const now = new Date();
  let year = now.getFullYear(), month = now.getMonth() + 1;

  container.appendChild(APP.h("div", { className: "header" }, APP.h("div", { className: "date" }, "历史记录")));
  const records = await DB.getAll();

  const renderCal = () => {
    APP.empty(container);
    container.appendChild(APP.h("div", { className: "header" }, APP.h("div", { className: "date" }, "历史记录")));

    const calCard = APP.h("div", { className: "card" });
    const header = APP.h("div", { className: "cal-header" });
    const prev = APP.h("button", { style: "border:none;background:none;font-size:18px;cursor:pointer;color:#007AFF", type: "button", onClick: () => { month--; if (month < 1) { month = 12; year--; } renderCal(); } }, "‹");
    header.appendChild(prev);
    header.appendChild(APP.h("span", { style: "font-size:16px;font-weight:600" }, year + "年" + month + "月"));
    const next = APP.h("button", { style: "border:none;background:none;font-size:18px;cursor:pointer;color:#007AFF", type: "button", onClick: () => { month++; if (month > 12) { month = 1; year++; } renderCal(); } }, "›");
    header.appendChild(next);
    calCard.appendChild(header);

    // Week headers
    const weeks = ["日","一","二","三","四","五","六"];
    const grid = APP.h("div", { className: "cal-grid" });
    for (const w of weeks) grid.appendChild(APP.h("div", { style: "font-size:12px;color:#8e8e93;padding:4px 0" }, w));

    // Days
    const firstDay = new Date(year, month - 1, 1).getDay();
    const daysInMonth = new Date(year, month, 0).getDate();
    const todayId = APP.today();

    // Empty cells
    for (let i = 0; i < firstDay; i++) grid.appendChild(APP.h("div", {}));

    for (let d = 1; d <= daysInMonth; d++) {
      const id = year + "-" + String(month).padStart(2,"0") + "-" + String(d).padStart(2,"0");
      const record = records.find(r => r.id === id);
      const isToday = id === todayId;
      const classes = ["day"];
      if (isToday) classes.push("today");
      if (record) classes.push("has-record", record.completed ? "completed" : "incomplete");
      const dayEl = APP.h("div", { className: classes.join(" "), onClick: () => {
        currentDate = id;
        currentRecord = record || { id, ...JSON.parse(JSON.stringify(EMPTY_RECORD)) };
        document.getElementById("view-dim").classList.remove("hidden");
        container.classList.add("hidden");
        APP.empty(document.getElementById("view-dim"));
        const backBtn = APP.h("button", { className: "back-btn", onClick: () => { currentDate = APP.today(); APP.renderHistory(); } }, "← 返回");
        document.getElementById("view-dim").appendChild(backBtn);
        document.getElementById("view-dim").appendChild(APP.h("div", { style: "font-size:13px;color:#8e8e93;margin-bottom:8px" }, APP.dateCN(id)));
        const infoCard = APP.h("div", { className: "card" });
        infoCard.appendChild(APP.h("div", { className: "card-title" }, APP.dateCN(id) + " 记录"));
        if (record && record.completed) infoCard.appendChild(APP.h("div", { className: "card-sub", style: "color:#34C759" }, "✓ 已完成"));
        else if (record) infoCard.appendChild(APP.h("div", { className: "card-sub", style: "color:#FF9500" }, "⚠ 未完成"));
        else infoCard.appendChild(APP.h("div", { className: "card-sub", style: "color:#8e8e93" }, "无记录"));
        for (const k of DIM_KEYS) {
          const cfg = DIM_LABELS[k], d = currentRecord[k];
          const hasScore = d && d.score != null;
          const card = APP.h("div", { className: "dim-card", onClick: () => APP.openDimension(k, id) });
          card.appendChild(APP.h("div", { className: "name" }, cfg.label));
          card.appendChild(APP.h("span", { className: "score " + (hasScore ? "filled" : "empty") }, hasScore ? d.score + "/10" : "未填写"));
          card.appendChild(APP.h("span", { className: "arrow" }, "›"));
          document.getElementById("view-dim").appendChild(card);
        }
      } }, d);
      grid.appendChild(dayEl);
    }
    calCard.appendChild(grid);
    container.appendChild(calCard);

    // Stats summary
    const monthRecords = records.filter(r => r.id.startsWith(year + "-" + String(month).padStart(2,"0")));
    if (monthRecords.length > 0) {
      const statCard = APP.h("div", { className: "card" });
      statCard.appendChild(APP.h("div", { className: "card-title" }, "本月统计"));
      statCard.appendChild(APP.h("div", { className: "card-sub" }, "记录天数：" + monthRecords.length + "天"));
      const completed = monthRecords.filter(r => r.completed).length;
      statCard.appendChild(APP.h("div", { className: "card-sub" }, "完成天数：" + completed + "天"));
      container.appendChild(statCard);
    }
  };
  renderCal();
};

/* ============ Export Logic ============ */
/* format field value for export */
APP.fmt = (val) => {
  if (val == null || val === "" || (Array.isArray(val) && val.length === 0)) return null;
  if (typeof val === "boolean") return val ? "是" : "否";
  if (!Array.isArray(val)) return String(val);
  // array of primitives (strings/numbers)
  if (typeof val[0] !== "object") return val.join("、");
  // array of objects — format each entry
  return val.map(obj => {
    return Object.entries(obj).filter(([,v]) => v != null && v !== "").map(([k,v]) => k + ": " + v).join("，");
  }).join("；");
};

APP.recordToMD = (record) => {
  if (!record) return "";
  const r = record;
  let md = "# " + r.id + " 健康记录\n\n";
  md += "**记录状态：**" + (r.completed ? "已完成" : "未完成") + "\n\n";
  const dims = [
    { key: "physical", label: "生理躯体健康", fields: [
      ["入睡难度", "sleep_difficulty"], ["睡眠时长(h)", "sleep_hours"], ["睡眠深浅", "sleep_depth"],
      ["睡眠质量", "sleep_quality"], ["晨起疲惫", "sleep_tiredness"], ["作息节律", "sleep_routine"],
      ["食欲", "appetite"], ["早餐", "breakfast"], ["午餐", "lunch"], ["晚餐", "dinner"],
      ["饮品", "drinks"], ["三餐规律", "meal_regularity"], ["饮食情况", "diet_behavior"],
      ["饮水", "water"], ["大便", "stool"], ["运动", "exercises"], ["久坐", "sedentary"],
      ["气血", "qi_blood"], ["体感", "symptoms"],
      ["医院","hospital"],["科室","department"],["就诊原因","visit_reason"],["用药","medication"],["用药原因","medication_reason"],
      ["评分","score"]
    ]},
    { key: "mental", label: "心理情绪健康", fields: [
      ["情绪基调","mood_tags"],
      ["心智状态","mental_states"],
      ["压力来源","stress_source"],["压力耐受","stress_tolerance"],["安抚能力","self_soothe_ability"],
      ["安抚行为","self_soothe_action"],["修复速度","recovery_speed"],
      ["自我否定","self_denial"],["自我否定原因","self_denial_reason"],
      ["包容状态","accept_present"],["包容原因","accept_present_reason"],
      ["评分","score"]
    ]},
    { key: "behavior", label: "时间与行为健康", fields: [
      ["完成率","completion_rate"],["拖延程度","procrastination"],["启动阻力","startup_resistance"],
      ["心流","flow_state"],["事务搁置","task_stagnation"],["短视频(h)","short_video_hours"],
      ["刷屏(次)","scroll_frequency"],["报复性休闲","revenge_leisure"],["空闲摆烂","slack_pattern"],
      ["中断能力","can_stop"],["调整行为","adjustment_action"],
      ["评分","score"]
    ]},
    { key: "interpersonal", label: "人际亲密健康", fields: [
      ["沟通记录","communication_entries"],
      ["社交时长(h)","social_hours"],["社交消耗","social_drain"],
      ["独处","solitude"],["边界问题","boundary_issue"],["边界原因","boundary_reason"],
      ["倾诉渠道","has_support"],["渠道说明","support_channel"],
      ["评分","score"]
    ]},
    { key: "purpose", label: "精神目标健康", fields: [
      ["短期目标","has_short_term_goal"],["长期方向","has_long_term_direction"],
      ["目标模糊","goal_vague"],["虚度感","feels_wasted"],["充实感","feels_fulfilled"],
      ["稳定主线","has_stable_path"],["被动消磨","drifts_easily"],["长期动力","long_term_motivation"],
      ["评分","score"]
    ]}
  ];
  for (const dim of dims) {
    const d = r[dim.key];
    md += "## " + dim.label + (d && d.score != null ? "：" + d.score + "/10" : "：未评分") + "\n\n";
    if (d) {
     for (const [label, key] of dim.fields) {
        try {
          const display = APP.fmt(d[key]);
          if (display != null) md += "**" + label + "：**" + display + "\n\n";
        } catch(e) {
          md += "**" + label + "：**（数据格式错误: " + ((e&&e.message)||"") + "）\n\n";
        }
     }
    }
  }
  return md;
};

APP.downloadMD = (content, filename) => {
  const blob = new Blob([content], { type: "text/markdown;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename || "health-record.md";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
};

APP.exportSingle = async () => {
  const id = APP.today();
  const record = await DB.get(id);
  if (!record) return APP.showToast("今天还没有记录");
  const md = APP.recordToMD(record);
  APP.downloadMD(md, id + "-健康记录.md");
  APP.showToast("已导出 " + id);
};

APP.exportWeek = async () => {
  const now = new Date();
  const dayOfWeek = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
  const all = await DB.getAll();
 
  const mondayId = monday.getFullYear() + "-" + String(monday.getMonth()+1).padStart(2,"0") + "-" + String(monday.getDate()).padStart(2,"0");
  weekRecords = all.filter(r => r.id >= mondayId && r.id <= APP.today());
  if (weekRecords.length === 0) return APP.showToast("本周暂无记录");
  let md = "# " + mondayId + " ~ " + APP.today() + " 健康周记\n\n";
  for (const r of weekRecords.sort((a, b) => a.id < b.id ? -1 : 1)) md += APP.recordToMD(r) + "\n---\n\n";
  APP.downloadMD(md, "健康周记-" + mondayId + "-to-" + APP.today() + ".md");
  APP.showToast("已导出本周 " + weekRecords.length + " 条记录");
};

APP.exportAll = async () => {
  const all = await DB.getAll();
  if (all.length === 0) return APP.showToast("暂无记录");
  let md = "# 全部健康记录\n\n";
  for (const r of all.sort((a, b) => a.id < b.id ? -1 : 1)) md += APP.recordToMD(r) + "\n---\n\n";
  APP.downloadMD(md, "全部健康记录-" + APP.today() + ".md");
  APP.showToast("已导出 " + all.length + " 条记录");
};
